apiVersion: v1
kind: ConfigMap
metadata:
  name: nginx-proxy-config
  namespace: yas
data:
  default.conf: |
    server {
      listen 80;
      server_name _;

      resolver kube-dns.kube-system.svc.cluster.local valid=10s;

      location /media/ {
        proxy_pass http://media.yas.svc.cluster.local;
      }
      location /swagger-ui/ {
        proxy_pass http://swagger-ui.yas.svc.cluster.local:8080;
      }
      location /product/ {
        proxy_pass http://product.yas.svc.cluster.local;
      }
      location /customer/ {
        proxy_pass http://customer.yas.svc.cluster.local;
      }
      location /cart/ {
        proxy_pass http://cart.yas.svc.cluster.local;
      }
      location /rating/ {
        proxy_pass http://rating.yas.svc.cluster.local;
      }
      location /order/ {
        proxy_pass http://order.yas.svc.cluster.local;
      }
      location /location/ {
        proxy_pass http://location.yas.svc.cluster.local;
      }
      location /inventory/ {
        proxy_pass http://inventory.yas.svc.cluster.local;
      }
      location /tax/ {
        proxy_pass http://tax.yas.svc.cluster.local;
      }
      location /promotion/ {
        proxy_pass http://promotion.yas.svc.cluster.local;
      }
      location /search/ {
        proxy_pass http://search.yas.svc.cluster.local;
      }
      location /payment/ {
        proxy_pass http://payment.yas.svc.cluster.local;
      }
      location /webhook/ {
        proxy_pass http://webhook.yas.svc.cluster.local;
      }
      location /sampledata/ {
        proxy_pass http://sampledata.yas.svc.cluster.local;
      }
      location /recommendation/ {
        proxy_pass http://recommendation.yas.svc.cluster.local;
      }
    }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: nginx
  namespace: yas
  labels:
    app: nginx
spec:
  replicas: 1
  selector:
    matchLabels:
      app: nginx
  template:
    metadata:
      labels:
        app: nginx
    spec:
      containers:
        - name: nginx
          image: nginx:1.27-alpine
          ports:
            - containerPort: 80
          volumeMounts:
            - name: config
              mountPath: /etc/nginx/conf.d/default.conf
              subPath: default.conf
          resources:
            requests:
              cpu: 50m
              memory: 32Mi
            limits:
              cpu: 200m
              memory: 128Mi
      volumes:
        - name: config
          configMap:
            name: nginx-proxy-config
---
apiVersion: v1
kind: Service
metadata:
  name: nginx
  namespace: yas
spec:
  selector:
    app: nginx
  ports:
    - port: 80
      targetPort: 80
