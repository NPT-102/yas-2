# Nâng cao: DestinationRule - Enforce mTLS cho service-to-service
# exportTo bao gồm ingress-nginx để sidecar của ingress-nginx cũng dùng mTLS
# khi kết nối đến các service trong namespace yas.
#
# Tạo riêng cho từng service để Kiali validate được (wildcard host gây lỗi validation).

---
apiVersion: networking.istio.io/v1beta1
kind: DestinationRule
metadata:
  name: mtls-backoffice-bff
  namespace: yas
spec:
  host: backoffice-bff.yas.svc.cluster.local
  exportTo: [".", "ingress-nginx"]
  trafficPolicy:
    tls:
      mode: ISTIO_MUTUAL
---
