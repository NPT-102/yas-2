# Nâng cao: Service Mesh - Retry policies
# Nếu service trả lỗi 5xx thì retry tự động

---
# Retry cho tax service
apiVersion: networking.istio.io/v1alpha3
kind: VirtualService
metadata:
  name: tax-retry
  namespace: yas
spec:
  hosts:
  - tax
  http:
  - route:
    - destination:
        host: tax
    retries:
      attempts: 3
      perTryTimeout: 2s
      retryOn: 5xx

