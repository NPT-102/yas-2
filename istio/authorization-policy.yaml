# Nâng cao: Service Mesh - Authorization Policies
# Chỉ cho phép service được phép giao tiếp mới kết nối được

---
# Deny all traffic by default trong namespace yas
apiVersion: security.istio.io/v1beta1
kind: AuthorizationPolicy
metadata:
  name: deny-all
  namespace: yas
spec:
  {}

---
# Cho phép Ingress Controller trong mesh truy cập vào YAS services
# ingress-nginx đã được inject sidecar nên có identity rõ ràng trong mesh.
apiVersion: security.istio.io/v1beta1
kind: AuthorizationPolicy
metadata:
  name: allow-ingress-to-yas
  namespace: yas
spec:
  action: ALLOW
  rules:
  - from:
    - source:
        principals:
          - "cluster.local/ns/ingress-nginx/sa/ingress-nginx"

---
# Cho phép BFF gọi đến tất cả backend services
apiVersion: security.istio.io/v1beta1
kind: AuthorizationPolicy
metadata:
  name: allow-bff-to-backends
  namespace: yas
spec:
  action: ALLOW
  rules:
  - from:
    - source:
        principals:
          - "cluster.local/ns/yas/sa/backoffice-bff"
          - "cluster.local/ns/yas/sa/storefront-bff"

---
# Cho phép order gọi đến cart, payment, inventory, tax, customer
apiVersion: security.istio.io/v1beta1
kind: AuthorizationPolicy
metadata:
  name: allow-order-dependencies
  namespace: yas
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: cart
  action: ALLOW
  rules:
  - from:
    - source:
        principals: ["cluster.local/ns/yas/sa/order"]

