# Nâng cao: Service Mesh - mTLS giữa tất cả service trong namespace yas
# PERMISSIVE cho phép cả mTLS và plaintext — cần thiết vì Ingress NGINX
# không nằm trong mesh (không có sidecar) → gửi plaintext HTTP.
# Traffic giữa các service có sidecar vẫn tự động dùng mTLS.
apiVersion: security.istio.io/v1beta1
kind: PeerAuthentication
metadata:
  name: default-mtls
  namespace: yas
spec:
  mtls:
    mode: PERMISSIVE
