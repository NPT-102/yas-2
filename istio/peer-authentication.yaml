# Nâng cao: Service Mesh - mTLS giữa tất cả service trong namespace yas
# STRICT: bắt buộc mTLS cho toàn bộ traffic vào namespace yas.
# ingress-nginx được inject sidecar → tự dùng mTLS qua DestinationRule ISTIO_MUTUAL.
# Không cần PERMISSIVE vì ingress-nginx đã ở trong mesh.
apiVersion: security.istio.io/v1beta1
kind: PeerAuthentication
metadata:
  name: default-mtls
  namespace: yas
spec:
  mtls:
    mode: STRICT
