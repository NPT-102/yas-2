name: Deploy to Staging (ArgoCD)

# Yêu cầu 6b: Khi tag v* → build image → cập nhật values-staging.yaml → ArgoCD auto-sync
on:
  push:
    tags:
      - 'v*'

jobs:
  build-and-deploy-staging:
    runs-on: self-hosted
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Get tag version
        id: tag
        run: echo "version=${GITHUB_REF_NAME}" >> $GITHUB_OUTPUT

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: 'maven'

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USER }}
          password: ${{ secrets.DOCKER_PASS }}

      # Build & push tất cả Java services với release tag
      - name: Build and Push Java services
        env:
          TAG: ${{ steps.tag.outputs.version }}
        run: |
          SERVICES="cart customer inventory location media order payment product promotion rating search tax recommendation sampledata webhook backoffice-bff storefront-bff"
          for svc in $SERVICES; do
            echo "=== Building ${svc} ==="
            mvn clean install -pl ${svc} -am -DskipTests
            docker build -t ${{ secrets.DOCKER_USER }}/${svc}:${TAG} ./${svc}
            docker push ${{ secrets.DOCKER_USER }}/${svc}:${TAG}
          done

      # Build & push frontend services
      - name: Build and Push Frontend services
        env:
          TAG: ${{ steps.tag.outputs.version }}
        run: |
          for svc in backoffice storefront; do
            echo "=== Building ${svc} ==="
            docker build -t ${{ secrets.DOCKER_USER }}/${svc}:${TAG} ./${svc}
            docker push ${{ secrets.DOCKER_USER }}/${svc}:${TAG}
          done

      # Cập nhật image tag trong values-staging.yaml → commit → ArgoCD tự động sync
      - name: Update staging image tags
        env:
          TAG: ${{ steps.tag.outputs.version }}
        run: |
          cd k8s/charts

          # Update backend services
          BACKEND="cart customer inventory location media order payment product promotion rating search tax recommendation webhook sampledata"
          for svc in $BACKEND; do
            cat > ${svc}/values-staging.yaml << EOF
          # Staging environment overrides - updated by CI at $(date -u +"%Y-%m-%dT%H:%M:%SZ")
          backend:
            image:
              tag: ${TAG}
          EOF
          done

          # Update BFF services
          cat > storefront-bff/values-staging.yaml << EOF
          # Staging environment overrides - updated by CI at $(date -u +"%Y-%m-%dT%H:%M:%SZ")
          backend:
            image:
              tag: ${TAG}
            ingress:
              host: staging.yas.local.com
          EOF

          cat > backoffice-bff/values-staging.yaml << EOF
          # Staging environment overrides - updated by CI at $(date -u +"%Y-%m-%dT%H:%M:%SZ")
          backend:
            image:
              tag: ${TAG}
            ingress:
              host: backoffice.staging.yas.local.com
          EOF

          # Update UI services
          cat > storefront-ui/values-staging.yaml << EOF
          # Staging environment overrides - updated by CI at $(date -u +"%Y-%m-%dT%H:%M:%SZ")
          ui:
            image:
              tag: ${TAG}
            extraEnvs:
              - name: API_BASE_PATH
                value: http://staging.yas.local.com/api
          EOF

          cat > backoffice-ui/values-staging.yaml << EOF
          # Staging environment overrides - updated by CI at $(date -u +"%Y-%m-%dT%H:%M:%SZ")
          ui:
            image:
              tag: ${TAG}
          EOF

      - name: Commit and push staging values
        env:
          TAG: ${{ steps.tag.outputs.version }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout main
          git add k8s/charts/*/values-staging.yaml
          git commit -m "chore: update staging image tags to ${TAG} [skip ci]" || echo "No changes"
          git push origin main

      - name: Setup kubectl
        uses: azure/setup-kubectl@v4

      - name: Configure kubeconfig
        run: |
          mkdir -p $HOME/.kube
          echo "${{ secrets.KUBE_CONFIG }}" | base64 -d > $HOME/.kube/config

      # Trigger ArgoCD sync ngay lập tức
      - name: Trigger ArgoCD Sync for Staging
        run: |
          if ! command -v argocd &> /dev/null; then
            curl -sSL -o /usr/local/bin/argocd https://github.com/argoproj/argo-cd/releases/latest/download/argocd-linux-amd64
            chmod +x /usr/local/bin/argocd
          fi

          ARGOCD_PASSWORD=$(kubectl -n argocd get secret argocd-initial-admin-secret -o jsonpath="{.data.password}" | base64 -d)
          argocd login argocd-server.argocd.svc.cluster.local:443 \
            --username admin \
            --password "$ARGOCD_PASSWORD" \
            --insecure \
            --grpc-web

          APPS=$(argocd app list -l environment=staging -o name 2>/dev/null || true)
          for app in $APPS; do
            echo "Syncing: $app"
            argocd app sync "$app" --async || true
          done

      - name: Wait for ArgoCD Sync and Verify Deployment
        run: |
          echo "Waiting for ArgoCD to sync staging apps..."
          sleep 30
          
          echo "Verifying deployments..."
          DEPLOYS=$(kubectl get deploy -n staging -o name)
          for deploy in $DEPLOYS; do
            echo "Checking rollout status for $deploy..."
            kubectl rollout status $deploy -n staging --timeout=120s
          done

      - name: Summary
        run: |
          echo "## Staging Deployment (ArgoCD)" >> $GITHUB_STEP_SUMMARY
          echo "Release: \`${{ steps.tag.outputs.version }}\`" >> $GITHUB_STEP_SUMMARY
          echo "ArgoCD auto-syncs all services to namespace **staging**" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Pods in staging namespace:" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          kubectl get pods -n staging --no-headers 2>/dev/null | head -30 >> $GITHUB_STEP_SUMMARY || true
          echo '```' >> $GITHUB_STEP_SUMMARY
