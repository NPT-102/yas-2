name: Deploy to Dev (ArgoCD)

# Yêu cầu 6a: main thay đổi -> ArgoCD auto-sync vào namespace dev
# ArgoCD ApplicationSet "yas-dev" watch main branch → auto deploy tất cả services
on:
  push:
    branches:
      - main

jobs:
  deploy-dev:
    runs-on: self-hosted
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup kubectl
        uses: azure/setup-kubectl@v4

      - name: Configure kubeconfig
        run: |
          mkdir -p $HOME/.kube
          echo "${{ secrets.KUBE_CONFIG }}" | base64 -d > $HOME/.kube/config

      # ArgoCD tự động sync khi phát hiện thay đổi trên main branch
      # Step này trigger manual sync để đảm bảo deploy ngay lập tức
      - name: Trigger ArgoCD Sync for Dev
        run: |
          # Cài argocd CLI nếu chưa có
          if ! command -v argocd &> /dev/null; then
            curl -sSL -o /usr/local/bin/argocd https://github.com/argoproj/argo-cd/releases/latest/download/argocd-linux-amd64
            chmod +x /usr/local/bin/argocd
          fi

          # Login ArgoCD (dùng admin password từ secret)
          ARGOCD_PASSWORD=$(kubectl -n argocd get secret argocd-initial-admin-secret -o jsonpath="{.data.password}" | base64 -d)
          argocd login argocd-server.argocd.svc.cluster.local:443 \
            --username admin \
            --password "$ARGOCD_PASSWORD" \
            --insecure \
            --grpc-web

          # Sync tất cả apps thuộc môi trường dev
          APPS=$(argocd app list -l environment=dev -o name 2>/dev/null || true)
          for app in $APPS; do
            echo "Syncing: $app"
            argocd app sync "$app" --async || true
          done

      - name: Wait for ArgoCD Sync and Verify Deployment
        run: |
          echo "Waiting for ArgoCD to sync dev apps..."
          sleep 30
          
          echo "Verifying deployments..."
          DEPLOYS=$(kubectl get deploy -n dev -o name)
          for deploy in $DEPLOYS; do
            echo "Checking rollout status for $deploy..."
            kubectl rollout status $deploy -n dev --timeout=120s
          done
          
          kubectl get pods -n dev --no-headers 2>/dev/null | head -30

      - name: Summary
        run: |
          echo "## Dev Deployment (ArgoCD)" >> $GITHUB_STEP_SUMMARY
          echo "Commit: \`${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY
          echo "ArgoCD auto-syncs all services to namespace **dev** from main branch" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Pods in dev namespace:" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          kubectl get pods -n dev --no-headers 2>/dev/null | head -30 >> $GITHUB_STEP_SUMMARY || true
          echo '```' >> $GITHUB_STEP_SUMMARY
