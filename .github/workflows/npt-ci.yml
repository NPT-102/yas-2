name: CI Build and Push

# Yêu cầu 3: Với mỗi branch, sau khi commit, build image với tag = commit id, push lên Docker Hub
on:
  push:
    branches:
      - '**'

env:
  JAVA_SERVICES: "cart customer inventory location media order payment payment-paypal product promotion rating search tax recommendation sampledata webhook backoffice-bff storefront-bff"
  FRONTEND_SERVICES: "backoffice storefront"

jobs:
  # Job 1: Detect service nào có thay đổi code
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      java_services: ${{ steps.filter.outputs.java_services }}
      frontend_services: ${{ steps.filter.outputs.frontend_services }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Detect changed services
        id: filter
        run: |
          CHANGED=$(git diff --name-only HEAD~1 HEAD 2>/dev/null || git diff --name-only ${{ github.event.before }} ${{ github.sha }})
          echo "Changed files:"
          echo "$CHANGED"

          JAVA=()
          FRONTEND=()

          for svc in $JAVA_SERVICES; do
            if echo "$CHANGED" | grep -q "^${svc}/"; then
              JAVA+=("\"${svc}\"")
            fi
          done

          for svc in $FRONTEND_SERVICES; do
            if echo "$CHANGED" | grep -q "^${svc}/"; then
              FRONTEND+=("\"${svc}\"")
            fi
          done

          echo "java_services=[$(IFS=,; echo "${JAVA[*]}")]" >> $GITHUB_OUTPUT
          echo "frontend_services=[$(IFS=,; echo "${FRONTEND[*]}")]" >> $GITHUB_OUTPUT
          echo "Java services to build: ${JAVA[*]}"
          echo "Frontend services to build: ${FRONTEND[*]}"

  # Job 2: Build Java services (cần Maven build trước khi docker build)
  build-java:
    needs: detect-changes
    if: needs.detect-changes.outputs.java_services != '[]'
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: ${{ fromJson(needs.detect-changes.outputs.java_services) }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: 'maven'

      - name: Build with Maven
        run: mvn clean install -pl ${{ matrix.service }} -am -DskipTests

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USER }}
          password: ${{ secrets.DOCKER_PASS }}

      - name: Build and Push Docker Image
        run: |
          COMMIT_ID=${GITHUB_SHA::7}
          IMAGE=${{ secrets.DOCKER_USER }}/${{ matrix.service }}

          docker build -t ${IMAGE}:${COMMIT_ID} ./${{ matrix.service }}
          docker push ${IMAGE}:${COMMIT_ID}

          # Tag main branch as latest
          if [ "${{ github.ref_name }}" = "main" ]; then
            docker tag ${IMAGE}:${COMMIT_ID} ${IMAGE}:latest
            docker push ${IMAGE}:latest
          fi

          echo "### Image pushed :whale:" >> $GITHUB_STEP_SUMMARY
          echo "- \`${IMAGE}:${COMMIT_ID}\`" >> $GITHUB_STEP_SUMMARY

  # Job 3: Build Frontend services (multi-stage Dockerfile, không cần Maven)
  build-frontend:
    needs: detect-changes
    if: needs.detect-changes.outputs.frontend_services != '[]'
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: ${{ fromJson(needs.detect-changes.outputs.frontend_services) }}
    steps:
      - uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USER }}
          password: ${{ secrets.DOCKER_PASS }}

      - name: Build and Push Docker Image
        run: |
          COMMIT_ID=${GITHUB_SHA::7}
          IMAGE=${{ secrets.DOCKER_USER }}/${{ matrix.service }}

          docker build -t ${IMAGE}:${COMMIT_ID} ./${{ matrix.service }}
          docker push ${IMAGE}:${COMMIT_ID}

          if [ "${{ github.ref_name }}" = "main" ]; then
            docker tag ${IMAGE}:${COMMIT_ID} ${IMAGE}:latest
            docker push ${IMAGE}:latest
          fi

          echo "### Image pushed :whale:" >> $GITHUB_STEP_SUMMARY
          echo "- \`${IMAGE}:${COMMIT_ID}\`" >> $GITHUB_STEP_SUMMARY